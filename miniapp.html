<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>ForgeEngine — The Forge Gauntlet (Farcaster)</title>

    <!--
      Farcaster Mini App embed card. Renders this page as a rich, launchable card when shared in a
      cast: tapping it opens the bundled demo game (The Forge Gauntlet) in-feed via the gated
      `?spec=` door. URLs point at the published GitHub Pages host; if a custom domain is set, swap
      the origin (see FARCASTER.md). `fc:miniapp` is the current key; `fc:frame` is for older clients.
      NOTE: in-feed launch still requires the maintainer's go-live — a signed accountAssociation for
      the serving domain + the card art (preview/splash png) — see FARCASTER.md. No secrets here.
    -->
    <meta
      name="fc:miniapp"
      content='{"version":"1","imageUrl":"https://ryjin111.github.io/forgeengine/preview.png","button":{"title":"▶ Play The Forge Gauntlet","action":{"type":"launch_miniapp","name":"ForgeEngine — The Forge Gauntlet","url":"https://ryjin111.github.io/forgeengine/miniapp.html?spec=demo.json","splashImageUrl":"https://ryjin111.github.io/forgeengine/splash.png","splashBackgroundColor":"#0b0f17"}}}'
    />
    <meta
      name="fc:frame"
      content='{"version":"1","imageUrl":"https://ryjin111.github.io/forgeengine/preview.png","button":{"title":"▶ Play The Forge Gauntlet","action":{"type":"launch_frame","name":"ForgeEngine — The Forge Gauntlet","url":"https://ryjin111.github.io/forgeengine/miniapp.html?spec=demo.json","splashImageUrl":"https://ryjin111.github.io/forgeengine/splash.png","splashBackgroundColor":"#0b0f17"}}}'
    />

    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0; padding: 12px;
        background: #0b0f17; color: #e5e7eb;
        font-family: system-ui, sans-serif;
        display: flex; flex-direction: column; align-items: center; gap: 10px;
      }
      h1 { font-size: 15px; font-weight: 600; margin: 4px 0 0; text-align: center; }
      h1 small { display: block; color: #9ca3af; font-weight: 400; font-size: 12px; margin-top: 2px; }
      #game { border: 1px solid #374151; border-radius: 8px; overflow: hidden; line-height: 0; }
      #seat { width: 100%; max-width: 384px; text-align: center; font-size: 12px; color: #9ca3af; }
      #seat[data-mode="play"] { color: #60a5fa; }
      #controls { width: 100%; max-width: 384px; display: none; gap: 6px; flex-wrap: wrap; justify-content: center; }
      #controls button { background: #1f2937; color: #e5e7eb; border: 1px solid #374151; border-radius: 6px; padding: 6px 10px; cursor: pointer; font-size: 12px; }
      #controls button:hover { background: #374151; }
      #controls .mr { display: inline-flex; gap: 4px; align-items: center; color: #9ca3af; }
      #status { width: 100%; max-width: 384px; background: #111827; border: 1px solid #374151; border-radius: 6px; padding: 10px; font-size: 13px; line-height: 1.45; min-height: 52px; }
      #status .you { color: #60a5fa; } #status .ai { color: #f87171; }
      #status .banner { font-size: 18px; font-weight: 700; color: #fbbf24; }
      #log { width: 100%; max-width: 384px; height: 140px; overflow-y: auto; background: #111827; border: 1px solid #374151; border-radius: 6px; padding: 8px; font-family: ui-monospace, monospace; font-size: 11px; }
      #log .row { padding: 1px 0; border-bottom: 1px solid #1f2937; }
      /* moveRange readout is needed by the scene but not shown in the watch view */
      .hidden { position: absolute; left: -9999px; }
    </style>
  </head>
  <body>
    <h1>MythosForge — Skirmish <small>deterministic, replayable · in-feed</small></h1>
    <div id="game"></div>
    <div id="seat">…</div>
    <!-- Play controls — hidden until a seated viewer enters play mode (see miniapp.ts). -->
    <div id="controls">
      <button id="pass">Pass</button>
      <button id="reset">New match</button>
      <span class="mr">moveRange <b id="mr">–</b>
        <button id="mrDown">–</button><button id="mrUp">+</button>
      </span>
    </div>
    <div id="status"></div>
    <div id="log"></div>
    <script type="module" src="/src/client/miniapp.ts"></script>
  </body>
</html>
